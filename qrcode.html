<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榕韵亲子定制 - 扫码访问</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #FAF7F2 0%, #E8D5C4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #C9A87C;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: #fff;
            border: 3px solid #E8D5C4;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .url {
            background: #FAF7F2;
            padding: 15px 20px;
            border-radius: 12px;
            word-break: break-all;
            font-size: 0.9rem;
            color: #444;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #C9A87C, #B84A3C);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(184, 74, 60, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(184, 74, 60, 0.4);
        }
        .subtitle {
            font-size: 0.85rem;
            color: #999;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 榕韵亲子定制</h1>
        <p>扫码访问自助设计网站</p>
        <div id="qrcode"></div>
        <div class="url">
            https://npcnp.github.io/rongyun-design/
        </div>
        <a href="https://npcnp.github.io/rongyun-design/" class="btn" target="_blank">
            直接访问 →
        </a>
        <p class="subtitle">手机扫码即可开始设计明信片/帆布袋</p>
    </div>

    <script>
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://npcnp.github.io/rongyun-design/",
            width: 256,
            height: 256,
            colorDark: "#2C2C2C",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
