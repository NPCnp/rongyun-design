<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>榕韵亲子定制 - 在线下单</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: #faf5f0;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #b45f2b;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .header p {
            color: #999;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #b45f2b;
        }
        .upload-box {
            background: #fff3e0;
            border: 2px dashed #b45f2b;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .upload-box img {
            max-width: 100%;
            max-height: 200px;
            margin-top: 12px;
            border-radius: 8px;
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #b45f2b;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .btn-submit:disabled {
            background: #ccc;
        }
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.1rem;
            margin-top: 20px;
            display: none;
        }
        .pickup-code {
            font-size: 2rem;
            font-weight: bold;
            color: #b45f2b;
            letter-spacing: 6px;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📸 榕韵亲子定制</h1>
        <p>三坊七巷店 · 在线下单</p>
    </div>

    <div class="form-group">
        <label>👤 您的姓名</label>
        <input type="text" id="nameInput" placeholder="请输入姓名">
    </div>

    <div class="form-group">
        <label>📱 手机号码</label>
        <input type="tel" id="phoneInput" placeholder="请输入手机号">
    </div>

    <div class="form-group">
        <label>🎨 上传设计图（可选）</label>
        <div class="upload-box" id="uploadBox">
            <p style="color:#b45f2b;">点击拍照或选择图片</p>
            <input type="file" accept="image/*" capture="environment" id="designFile" style="display:none;">
            <img id="preview" style="display:none;">
        </div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="submitOrder()">✅ 确认下单</button>

    <div class="success-message" id="successMsg">
        <p>🎉 下单成功！</p>
        <p>您的取件码为</p>
        <div class="pickup-code" id="pickupCodeDisplay"></div>
        <p>请保存此取件码，凭码取件</p>
    </div>

    <script>
        // ========== Supabase 配置 ==========
        const SUPABASE_URL = 'https://mmfovpkrzodkvnokauqy.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_LYvf6FRSMSZRc9lfFIKOnA_XG7InVYt';
        // =====================================

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const uploadBox = document.getElementById('uploadBox');
        const designFile = document.getElementById('designFile');
        const preview = document.getElementById('preview');
        let designBase64 = '';
        let lastOrderNo = 0;

        // 页面加载时获取最大订单号
        async function init() {
            try {
                const { data } = await supabase
                    .from('orders')
                    .select('order_no')
                    .order('order_no', { ascending: false })
                    .limit(1);
                
                if (data && data.length > 0) {
                    lastOrderNo = data[0].order_no;
                }
            } catch (e) {
                console.log('获取订单号失败', e);
            }
        }
        init();

        uploadBox.addEventListener('click', () => designFile.click());
        designFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                designBase64 = ev.target.result;
                preview.src = designBase64;
                preview.style.display = 'block';
                uploadBox.querySelector('p').style.display = 'none';
            };
            reader.readAsDataURL(file);
        });

        async function submitOrder() {
            const name = document.getElementById('nameInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();

            if (!name || !phone) {
                alert('请填写姓名和手机号');
                return;
            }

            const orderNo = lastOrderNo + 1;
            lastOrderNo = orderNo;
            const pickupCode = Math.floor(100000 + Math.random() * 900000).toString(); // 6位随机数

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            const { error } = await supabase
                .from('orders')
                .insert([{
                    order_no: orderNo,
                    name: name,
                    phone: phone,
                    pickup_code: pickupCode,
                    design: designBase64 || null,
                    status: '待制作',
                    time: new Date().toLocaleString('zh-CN'),
                    device_type: 'mobile'
                }]);

            if (error) {
                alert('下单失败：' + error.message);
                btn.disabled = false;
                btn.textContent = '✅ 确认下单';
                return;
            }

            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('pickupCodeDisplay').textContent = pickupCode;
            document.getElementById('submitBtn').style.display = 'none';
        }
    </script>
</body>
</html>
