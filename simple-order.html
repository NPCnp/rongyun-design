<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>榕韵亲子定制 - 简易下单</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 1.8rem;
            color: #b45f2b;
            margin-bottom: 8px;
        }
        .status {
            margin-bottom: 20px;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 10px;
            text-align: center;
            font-size: 0.95rem;
        }
        .status.connected { background: #d1fae5; color: #059669; }
        .status.error { background: #fee2e2; color: #dc2626; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #b45f2b;
        }
        .order-no {
            background: #fef3c7;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        .order-no .label {
            color: #92400e;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }
        .order-no .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #b45f2b;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #b45f2b;
            color: white;
        }
        .btn-primary:hover {
            background: #9a4e24;
            transform: translateY(-2px);
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .pickup-code {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            text-align: center;
            display: none;
        }
        .pickup-code.show { display: block; }
        .pickup-code .label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .pickup-code .code {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 6px;
        }
        .pickup-code .btn-copy {
            margin-top: 12px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .log {
            margin-top: 20px;
            padding: 12px;
            background: #1f2937;
            color: #10b981;
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .log.show { display: block; }
        .debug-toggle {
            text-align: center;
            margin-top: 15px;
            color: #666;
            font-size: 0.85rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 榕韵亲子定制</h1>
            <p>简单快捷下单</p>
        </div>
        
        <div class="status" id="status">连接中...</div>
        
        <div class="order-no">
            <div class="label">订单号</div>
            <div class="value" id="orderNo">-</div>
        </div>
        
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="nameInput" placeholder="请输入您的姓名">
        </div>
        
        <div class="form-group">
            <label>手机号 *</label>
            <input type="tel" id="phoneInput" placeholder="请输入手机号">
        </div>
        
        <button class="btn btn-primary" id="submitBtn" onclick="submitOrder()">
            ✅ 提交订单
        </button>
        
        <div class="pickup-code" id="pickupCode">
            <div class="label">您的取件码</div>
            <div class="code" id="pickupCodeValue">-</div>
            <button class="btn-copy" onclick="copyPickupCode()">📋 复制取件码</button>
        </div>
        
        <div class="debug-toggle" onclick="toggleLog()">
            🔧 点击查看调试信息
        </div>
        
        <div class="log" id="log"></div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://mmfovpkrzodkvnokauqy.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LYvf6FRSMSZRc9lfFIKOnA_XG7InVYt';
        
        let supabase = null;
        
        function addLog(msg) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            log.innerHTML = `<div>[${time}] ${msg}</div>` + log.innerHTML;
            console.log(msg);
        }
        
        function toggleLog() {
            document.getElementById('log').classList.toggle('show');
        }
        
        async function init() {
            try {
                addLog('初始化Supabase...');
                addLog('URL: ' + SUPABASE_URL);
                
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                
                const status = document.getElementById('status');
                status.textContent = '✅ 连接成功，准备就绪！';
                status.classList.add('connected');
                
                generateOrderNo();
                addLog('初始化完成！');
            } catch (e) {
                addLog('❌ 初始化失败: ' + e.message);
                const status = document.getElementById('status');
                status.textContent = '❌ 连接失败: ' + e.message;
                status.classList.add('error');
            }
        }
        
        function generateOrderNo() {
            const no = Date.now();
            document.getElementById('orderNo').textContent = no;
            addLog('生成订单号: ' + no);
        }
        
        async function submitOrder() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            
            const name = document.getElementById('nameInput').value.trim();
            const phone = document.getElementById('phoneInput').value.trim();
            const orderNo = document.getElementById('orderNo').textContent;
            
            addLog('开始提交订单...');
            addLog('姓名: ' + name);
            addLog('手机: ' + phone);
            addLog('订单号: ' + orderNo);
            
            if (!name) {
                alert('请输入姓名');
                btn.disabled = false;
                btn.textContent = '✅ 提交订单';
                return;
            }
            
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号');
                btn.disabled = false;
                btn.textContent = '✅ 提交订单';
                return;
            }
            
            const pickupCode = Math.floor(100000 + Math.random() * 900000);
            addLog('生成取件码: ' + pickupCode);
            
            try {
                addLog('正在保存到Supabase...');
                
                const { data, error } = await supabase
                    .from('orders')
                    .insert([{
                        order_no: parseInt(orderNo),
                        name: name,
                        phone: phone,
                        pickup_code: pickupCode.toString(),
                        status: '待制作',
                        time: new Date().toLocaleString('zh-CN')
                    }]);
                
                if (error) {
                    addLog('❌ 保存失败: ' + error.message);
                    alert('保存失败: ' + error.message);
                    btn.disabled = false;
                    btn.textContent = '✅ 提交订单';
                    return;
                }
                
                addLog('✅ 保存成功！');
                
                document.getElementById('pickupCodeValue').textContent = pickupCode;
                document.getElementById('pickupCode').classList.add('show');
                
                btn.textContent = '✅ 提交成功！';
                btn.style.background = '#10b981';
                
                addLog('🎉 订单提交完成！');
                
                setTimeout(() => {
                    document.getElementById('nameInput').value = '';
                    document.getElementById('phoneInput').value = '';
                    document.getElementById('pickupCode').classList.remove('show');
                    generateOrderNo();
                    btn.disabled = false;
                    btn.textContent = '✅ 提交订单';
                    btn.style.background = '';
                }, 3000);
                
            } catch (e) {
                addLog('❌ 异常: ' + e.message);
                alert('提交失败: ' + e.message);
                btn.disabled = false;
                btn.textContent = '✅ 提交订单';
            }
        }
        
        function copyPickupCode() {
            const code = document.getElementById('pickupCodeValue').textContent;
            navigator.clipboard.writeText(code).then(() => {
                alert('取件码已复制: ' + code);
            }).catch(() => {
                alert('复制成功: ' + code);
            });
        }
        
        init();
    </script>
</body>
</html>
